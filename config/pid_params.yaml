lane_controller:
  ros__parameters:

    # PID — sintonizar en este orden: primero kp, luego kd, al final ki
    kp: 5.0          # proporcional (oscila si es muy alto)
    ki: 0.0          # integral desactivado: evita drift acumulado de curvas
    kd: 1.5          # derivativo (amortigua oscilaciones)
    kff: 2.3         # feed-forward de tendencia (anticipa giros)

    # Velocidad de crucero
    linear_speed: 0.14   # m/s

    max_angular: 3.5     # rad/s — saturación de omega
    integral_limit: 0.5  # anti-windup: límite acumulador integral
    error_timeout: 0.8   # s — sin /lane_error → modo recuperación
    control_rate: 30.0   # Hz del lazo de control
    recovery_w: 1.05     # rad/s = 60 deg/s girando al buscar la línea perdida
    recovery_v: 0.05     # m/s avance lento mientras busca la línea
    history_size: 6      # muestras para calcular tendencia de giro (~0.2s)
    turn_threshold: 0.3  # |ω| rad/s mínimo para activar FF (giro diferencial real)

    # Conteo de curvas por velocidad angular
    curves_to_stop:   14   # 3 vueltas × 4 curvas + margen
    curve_w_on:      1.5   # |ω| rad/s para entrar a curva
    curve_w_off:     0.5   # |ω| rad/s para salir de curva
    curve_min_frames:  5   # frames consecutivos para confirmar curva
