lane_detector:
  ros__parameters:

    # ---------------------------------------------------------------
    # Blanco - LAB (más robusto que HSV para blancos con reflejos)
    # L = luminosidad (0-255), A y B son canales de color (128 = neutro)
    # Blanco: L alto, A y B cerca de 128
    # ---------------------------------------------------------------
    white_l_min: 95
    white_l_max: 255
    white_a_min: 90
    white_a_max: 165
    white_b_min: 90
    white_b_max: 165
    white_min_aspect: 1.2   # altura/ancho mínimo — filtra líneas consecutivas vs manchas
    white_max_area: 8000    # rechaza manchas grandes (reflejos de suelo brillante)

    # ---------------------------------------------------------------
    # Amarillo - HSV - borde IZQUIERDO del carril
    # ---------------------------------------------------------------
    yellow_h_min: 15
    yellow_h_max: 40
    yellow_s_min: 60
    yellow_s_max: 255
    yellow_v_min: 80
    yellow_v_max: 255

    # ---------------------------------------------------------------
    # Geometría / IPM
    # ---------------------------------------------------------------
    min_area: 150
    lane_width_m: 0.21
    px_per_meter: 600.0
    look_ahead_row: 0.88
    publish_debug: true
