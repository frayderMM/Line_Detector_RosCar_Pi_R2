lane_detector:
  ros__parameters:

    # ---------------------------------------------------------------
    # Blanco - HSV
    # Blanco/gris bajo sombra: sin color (S baja) + brillo medio-alto (V alta)
    # El piso negro tiene V muy baja, el amarillo tiene S muy alta → no se confunden
    # ---------------------------------------------------------------
    white_s_min: 0
    white_s_max: 80     # sube si no detecta, baja si pica colores del piso
    white_v_min: 140    # baja si no detecta, sube si pica el piso oscuro
    white_v_max: 255
    white_max_area: 25000

    # ---------------------------------------------------------------
    # Amarillo - HSV - línea IZQUIERDA del carril
    # ---------------------------------------------------------------
    yellow_h_min: 15
    yellow_h_max: 40
    yellow_s_min: 60
    yellow_s_max: 255
    yellow_v_min: 80
    yellow_v_max: 255

    # ---------------------------------------------------------------
    # Geometría / IPM
    # ---------------------------------------------------------------
    min_area: 150
    px_per_meter: 600.0
    look_ahead_row: 0.88
    band_half_height: 30

    # ---------------------------------------------------------------
    # Navegación — amarillo como referencia principal
    # yellow_setpoint: fracción del ancho donde debe aparecer el amarillo
    #   0.25 = 25% desde la izquierda (robot más pegado al amarillo)
    #   0.35 = 35% desde la izquierda (robot más al centro)
    # white_weight: cuánto influye el blanco cuando se detectan ambas líneas
    #   0.0 = ignorar blanco completamente
    #   0.25 = blanco aporta 25% de corrección
    # ---------------------------------------------------------------
    yellow_setpoint: 0.28
    white_weight: 0.25

    # ---------------------------------------------------------------
    # Comportamiento
    # ---------------------------------------------------------------
    require_both_lines: false
    publish_debug: true
